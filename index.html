<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>F'FOREVER Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.header img{
    width:100%;
    height:230px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,255,255,0.5);
}

/* TITLE */
.title{
    text-align:center;
    font-size:28px;
    font-weight:600;
    margin-top:15px;
}

.subtitle{
    text-align:center;
    color:#00eaff;
    margin-bottom:20px;
}

/* BOX */
.box{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
    backdrop-filter:blur(10px);
}

/* INPUT */
input, select{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:rgba(0,0,0,0.5);
    color:white;
}

/* TICKET */
.ticket{
    display:flex;
    justify-content:space-between;
    padding:12px;
    border-radius:10px;
    margin:5px 0;
    border:1px solid rgba(255,255,255,0.2);
    cursor:pointer;
}

.ticket:hover{
    background:rgba(0,255,255,0.1);
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#00eaff,#007bff);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    box-shadow:0 0 20px #00eaff;
}

/* TOTAL */
#total{
    font-weight:bold;
    text-align:center;
    background:#000;
}

/* QRIS */
#qrisBox{
    display:none;
    text-align:center;
    margin-top:20px;
    opacity:0;
    transition:0.5s;
}

#qrisBox img{
    width:100%;
    max-width:300px;
    border-radius:15px;
    box-shadow:0 0 20px #00eaff;
}

/* SUCCESS */
.success{
    text-align:center;
    font-size:18px;
    margin-top:15px;
    color:#00ffcc;
}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<img src="header.jpg" onerror="this.src='https://via.placeholder.com/900x230'">
</div>

<div class="title">FORM PEMBELIAN TIKET</div>
<div class="title">F'FOREVER</div>
<div class="subtitle">29 - 30 Mei | Indonesia Arena</div>

<form id="form">

<!-- DATA -->
<div class="box">
<h3>DATA PEMBELI</h3>

<input type="text" id="nama" placeholder="Nama Lengkap" required>
<input type="email" id="email" placeholder="Email Aktif" required>
<input type="text" id="wa" placeholder="Nomor WhatsApp" required>
<input type="text" id="kota" placeholder="Kota Domisili">

</div>

<!-- TIKET -->
<div class="box">
<h3>PILIHAN TIKET</h3>

<label class="ticket">
<input type="radio" name="tiket" value="1250000"> Bronze - IDR 1.250.000
</label>

<label class="ticket">
<input type="radio" name="tiket" value="1450000"> Silver - IDR 1.450.000
</label>

<label class="ticket">
<input type="radio" name="tiket" value="2100000"> Gold - IDR 2.100.000
</label>

<label class="ticket">
<input type="radio" name="tiket" value="3950000"> Diamond VIP - IDR 3.950.000
</label>

<label class="ticket">
<input type="radio" name="tiket" value="4500000"> Super VVIP - IDR 4.500.000
</label>

<select id="jumlah">
<option value="1">Jumlah Tiket: 1</option>
<option value="2">Jumlah Tiket: 2</option>
<option value="3">Jumlah Tiket: 3</option>
</select>

<input type="text" id="total" placeholder="Total Pembayaran" readonly>

</div>

<!-- PEMBAYARAN -->
<div class="box">
<h3>METODE PEMBAYARAN</h3>

<label><input type="radio" name="bayar" value="QRIS"> QRIS</label>
<label><input type="radio" name="bayar" value="Transfer"> Transfer Bank</label>
<label><input type="radio" name="bayar" value="Ewallet"> E-Wallet</label>

</div>

<!-- CATATAN -->
<div class="box">
<ul>
<li>Harga belum termasuk pajak</li>
<li>Tiket tidak dapat dikembalikan</li>
</ul>

<label><input type="checkbox" required> Saya setuju dengan syarat</label>

</div>

<button type="submit">SUBMIT ORDER</button>

</form>

<!-- QRIS -->
<div id="qrisBox">
<h3>Scan untuk bayar</h3>
<img src="qris.png" onerror="this.src='https://via.placeholder.com/300'">
<p>Kirim bukti pembayaran ke admin</p>
<div class="success">Pesanan berhasil dibuat</div>
</div>

</div>

<script>

const tiket=document.getElementsByName('tiket');
const jumlah=document.getElementById('jumlah');
const total=document.getElementById('total');
const form=document.getElementById('form');
const qrisBox=document.getElementById('qrisBox');

function hitung(){
let harga=0;

tiket.forEach(t=>{
if(t.checked) harga=parseInt(t.value);
});

let qty=parseInt(jumlah.value);
total.value="IDR "+(harga*qty).toLocaleString();
}

tiket.forEach(t=>t.addEventListener('change',hitung));
jumlah.addEventListener('change',hitung);

form.addEventListener('submit',function(e){
e.preventDefault();

hitung();

if(total.value===""){
alert("Pilih tiket dulu!");
return;
}

qrisBox.style.display="block";

setTimeout(()=>{
qrisBox.style.opacity="1";
},100);

qrisBox.scrollIntoView({behavior:"smooth"});

});

</script>

</body>
</html>
